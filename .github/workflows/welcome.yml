name: Welcome

on:
  pull_request:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            Olá! Obrigado pelo PR 👋
            
            Antes do review, verifique:
            - O CI está passando ✅
            - O checklist do template foi preenchido ✅
            - As migrations seguem o padrão VX__descricao.sql ✅
            
            Um revisor será atribuído em breve.
