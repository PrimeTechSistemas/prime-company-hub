name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: prime_company_hub
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Permissão no mvnw
        run: chmod +x ./mvnw

      - name: Build e testes
        run: ./mvnw verify
        env:
          SPRING_PROFILES_ACTIVE: dev
          DB_URL: jdbc:postgresql://localhost:5432/prime_company_hub
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
